<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>xeogl STL Collimator Demo</title>

    <script src="https://cdn.jsdelivr.net/npm/xeogl@0.9.0/build/xeogl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xeogl@0.9.0/examples/js/models/STLModel.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<script>
window.onload = function () {
    var scene = xeogl.getDefaultScene();
    scene.canvas.backgroundColor = [1.0, 1.0, 1.0];
    scene.clearLights();

    new xeogl.CameraControl();
    scene.camera.eye = [0, 80, 80]; 
    scene.camera.look = [0, 0, 0];

    // =========================
    // LIGHTS (Static Position)
    // =========================
    var lightPos = [0, 0, -50];

    // The primary source behind the model
    new xeogl.PointLight({
        pos: lightPos,
        color: [1, 0.9, 0.7],
        intensity: 1.0,
        attenuation: [1.0, 0.01, 0.001] 
    });

    // REPLACED DirLight with AmbientLight
    // This provides subtle visibility to shadowed areas 
    // without "shining" light from the camera's perspective.
    new xeogl.AmbientLight({
        color: [1.0, 1.0, 1.0],
        intensity: 0.2 
    });

    // Light Indicator
    new xeogl.Mesh({
        geometry: new xeogl.SphereGeometry({ radius: 2 }),
        material: new xeogl.PhongMaterial({
            emissive: [1, 0.9, 0.3],
            diffuse: [0, 0, 0]
        }),
        position: lightPos
    });

    // =========================
    // DETECTOR PLANE (Enlarged)
    // =========================
    new xeogl.Mesh({
        geometry: new xeogl.PlaneGeometry({
            xSize: 100, // Increased from 10 to 100
            zSize: 100, // Increased from 10 to 100
            xSegments: 20, 
            zSegments: 20
        }),
        material: new xeogl.PhongMaterial({
            diffuse: [0.4, 0.4, 0.4],
            backfaces: true, // Allow seeing it from both sides
            wireframe: true
        }),
        position: [0, 0, 80],
        rotation: [90, 0, 0]
    });

    // =========================
    // STL MODEL
    // =========================
    const model = new xeogl.STLModel({
        src: "collimator.stl",
        smoothNormals: true,
        scale: [0.5, 0.5, 0.5],
        position: [0, 0, 0]
    });

    model.on("loaded", () => {
        Object.values(model.meshes).forEach(mesh => {
            mesh.material = new xeogl.PhongMaterial({
                diffuse: [0.6, 0.6, 0.6],
                alpha: 0.9,           // Higher opacity feels more "solid"
                transparent: true,
                alphaMode: "blend",
                backfaces: false,      // CRITICAL: Hide internal lit faces
                shininess: 20          // Adds some hardware-like specularity
            });
        });
    });
};
</script>

</body>
</html>
