<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>xeogl STL Collimator Demo</title>

    <!-- Stable xeogl -->
    <script src="https://cdn.jsdelivr.net/npm/xeogl@0.9.0/build/xeogl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xeogl@0.9.0/examples/js/models/STLModel.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<script>
window.onload = function () {

    // =========================
    // SCENE + CAMERA
    // =========================
    const scene = new xeogl.Scene();

    new xeogl.CameraControl();

    scene.camera.eye = [0, 0, 10];
    scene.camera.look = [0, 0, 0];

    // =========================
    // LIGHTS (behind STL)
    // =========================


    // Non-attenuated light (collimator-like)
    new xeogl.PointLight({
        pos: [0, 0, -50],
        color: [1, 0.9, 0.7],
        intensity: 1,
        attenuation: [0, 0, 0]
    });

    // =========================
    // DETECTOR PLANE
    // =========================
    new xeogl.Mesh({
        geometry: new xeogl.PlaneGeometry({
            xSize: 100,
            ySize: 100
        }),
        material: new xeogl.PhongMaterial({
            diffuse: [0.2, 0.4, 0.8],
            backfaces: true
        }),
        position: [0, 0, 30]
    });

    // =========================
    // STL MODEL
    // =========================
    const model = new xeogl.STLModel({
        src: "collimator.stl",   // <--  STL file
        smoothNormals: true,
        scale: [0.5, 0.5, 0.5],
        position: [0, 0, 0]
    });

    // Apply material AFTER load (FIXED)
    model.on("loaded", () => {

        Object.values(model.meshes).forEach(mesh => {

            mesh.material = new xeogl.PhongMaterial({
                diffuse: [0.8, 0.8, 0.8],
                alpha: 0.4,
                alphaMode: "blend",   // REQUIRED for transparency
                backfaces: true,
                shininess: 10
            });

        });

    });

};
</script>

</body>
</html>
