<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>xeogl STL Collimator Demo</title>

    <script src="https://cdn.jsdelivr.net/npm/xeogl@0.9.0/build/xeogl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xeogl@0.9.0/examples/js/models/STLModel.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; }
    </style>
</head>
<body>

<script>
window.onload = function () {

    // =========================
    // SCENE + CAMERA
    // =========================
    var scene = xeogl.getDefaultScene();

    // 1. Make background white
    scene.canvas.backgroundColor = [1.0, 1.0, 1.0];

    scene.clearLights();

    new xeogl.CameraControl();

    scene.camera.eye = [0, 0, 80]; // Pulled back to see the whole setup
    scene.camera.look = [0, 0, 0];

    // =========================
    // LIGHTS (behind STL)
    // =========================
    var lightPos = [0, 0, -50];

    new xeogl.PointLight({
        pos: lightPos,
        color: [1, 0.9, 0.7],
        intensity: 1,
        attenuation: [0, 0, 0],
        shadow: true
    });

    new xeogl.DirLight({
        dir: [0.8, -1.0, -0.8],
        color: [1.0, 1.0, 1.0],
        intensity: 0.5,
        space: "view" // This makes the light move with the camera (headlamp effect)
    });
        
    // 2. Make light "visible" by placing a small emissive sphere at lightPos
    new xeogl.Mesh({
        geometry: new xeogl.SphereGeometry({ radius: 1 }),
        material: new xeogl.PhongMaterial({
            emissive: [1, 0.9, 0.3], // Glow effect
            diffuse: [0, 0, 0]
        }),
        position: lightPos
    });

    // =========================
    // DETECTOR PLANE
    // =========================
    // 3. Make detector plane mesh visible (Wireframe + color)
    new xeogl.Mesh({
        geometry: new xeogl.PlaneGeometry({
            xSize: 10,
            zSize: 10,
            xSegments: 50, 
            zSegments: 50
        }),
        material: new xeogl.PhongMaterial({
            diffuse: [0.8, 0.8, 0.8],
            backfaces: false,
            wireframe: true,
            lineWidth: 2
        }),
        position: [0, 0, 80],
        rotation: [90, 0, 0], // Rotate 90 degrees on the X-axis to face the camera
        receiveShadow: true
    });

    // =========================
    // STL MODEL
    // =========================
    const model = new xeogl.STLModel({
        src: "collimator.stl",
        smoothNormals: true,
        scale: [0.5, 0.5, 0.5],
        position: [0, 0, 0],
        castShadow: true
    });

    model.on("loaded", () => {
        Object.values(model.meshes).forEach(mesh => {
            mesh.material = new xeogl.PhongMaterial({
                diffuse: [0.5, 0.5, 0.5],
                alpha: 0.8,
                transparent: true,
                alphaMode: "blend",
                backfaces: false,
                shininess: 0
            });
        });
    });

};
</script>

</body>
</html>
